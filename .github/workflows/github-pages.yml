# Build Expo web static export and deploy to GitHub Pages (https://roime99.github.io/animanal/)
name: Deploy GitHub Pages

# Opt into Node 24 for any action still on the older runtime (see GitHub changelog 2025-09-19).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # v6+ runs the action on Node 24 (avoids Node 20 deprecation on checkout/setup-node v4).
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      # preexport:web runs sync:bg (repo root bg/ → mobile/assets/bg/) so Metro can resolve requires on a clean clone.
      - name: Export static web
        working-directory: mobile
        env:
          # Required: Repo → Settings → Secrets → Actions → EXPO_PUBLIC_API_URL
          # Example: https://your-api.onrender.com  (no trailing slash)
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npm run export:web

      - name: SPA fallback (GitHub Pages 404 → same as index.html)
        run: cp mobile/dist/index.html mobile/dist/404.html

      # Expo uses `_expo/`; Jekyll would ignore it unless disabled.
      - name: Disable Jekyll
        run: touch mobile/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: mobile/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
